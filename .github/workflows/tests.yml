# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    
  pull_request:
    

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    services:
        postgres:
            image: postgres:16
            env:
                POSTGRES_USER: ${{ secrets.TEST_DB_USER }}
                POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD}}
                POSTGRES_DB: ${{ secrets.TEST_DB_NAME }}
            ports:
                - 5432:5432

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
        cache: 'pip'
    - name: Install dependencies
      run: |
        sudo systemctl start postgresql.service
        python -m pip install --upgrade pip
        pip install -r module_5/requirements.txt
# if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Stage database
      run: |
        set DB_HOST = ${{ secrets.TEST_DB_HOST }}
        set DB_PORT = ${{ secrets.TEST_DB_PORT }}
        set DB_NAME = ${{ secrets.TEST_DB_NAME }}
        set DB_USER = ${{ secrets.TEST_DB_USER }}
        set DB_PASSWORD = ${{ secrets.TEST_DB_PASSWORD }}
        python ./scripts/test_setup.py
    - name: Lint with PyLint
      run: |
        cd module_5
        pylint --fail-under=10 src
    - name: Test with pytest
      run: |
        cd module_5
        pytest --cov-report term-missing --rootdir=./ --cov=./src tests/
