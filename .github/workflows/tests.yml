# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    
  pull_request:
    

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    services:
        postgres:
            image: postgres:16
            env:
                POSTGRES_USER: ${{ secrets.TEST_DB_USER }}
                POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASS }}
                POSTGRES_DB: gradcafe
            ports:
                - 5430:5430

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
        cache: 'pip'
      env:
        TEST_DB_HOST: ${{ secrets.TEST_DB_USER }}
        TEST_DP_PORT: ${{ secrets.TEST_DB_PORT }}
        TEST_DB_NAME: ${{ secrets.TEST_DB_NAME }}
        TEST_DB_USER: ${{ secrets.TEST_DB_USER }}
        TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        DB_HOST: ${{ secrets.TEST_DB_USER }}
        DP_PORT: ${{ secrets.TEST_DB_PORT }}
        DB_NAME: ${{ secrets.TEST_DB_NAME }}
        DB_USER: ${{ secrets.TEST_DB_USER }}
        DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
    - name: Install dependencies
      run: |
        sudo systemctl start postgresql.service
        python -m pip install --upgrade pip
        cd module_5
        pip install -r requirements.txt
# if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Stage database
      run: python ../scripts/test_setup.py
    - name: Lint with PyLint
      run: pylint --fail-under=10 src
    - name: Test with pytest
      run: |
        pytest --cov-report term-missing --cov=src tests/
